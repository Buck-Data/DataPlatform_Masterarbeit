version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: scrap_platform
      POSTGRES_USER: scrap_user
      POSTGRES_PASSWORD: scrap_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scrap_user -d scrap_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.api.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scrap_user:scrap_pass@db:5432/scrap_platform
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  streamlit:
    build: .
    command: streamlit run app/main.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://scrap_user:scrap_pass@db:5432/scrap_platform

volumes:
  postgres_data:
